# App registry for nomad-deploy.sh
# Format: APP_NAME  SRC_PATH
#
# SRC_PATH: path to app source on your Mac (~ expands to $HOME)
# Each project must have a build.sh in its source directory.
#
# Customize these paths to match your local directory layout.
# When using --app without --src, the path here is used.
# When using --all, every non-comment line is built and deployed.

ytsumm-bot        ~/Desktop/[code]/telegram-youtube-summarizer/
mcpingbot         ~/Desktop/[code]/mcpingbot/
textplease-bot    ~/Desktop/[code]/textplease_bot/
cron-checker-bot  ~/Desktop/[code]/cron-checker-bot/
recipe-book       ~/Desktop/[code]/recipe_boook/
